<svg width="900" height="130" viewBox="0 0 900 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      font-size: 52px;
      font-weight: 800;
      letter-spacing: 3px;
      text-anchor: middle;
    }

    .subtitle {
      font-size: 42px;
      letter-spacing: 2.5px;
    }

    .shadow {
      fill: rgba(23, 37, 84, 0.55);
    }

    .main {
      fill: #ffffff;
    }

  </style>

  <g>
    <text x="453" y="58" class="title shadow">POWERFUL AI</text>
    <text x="450" y="54" class="title main">POWERFUL AI</text>
  </g>

  <g>
    <text x="453" y="116" class="title subtitle shadow">WITHOUT LOSING HUMAN AGENCY</text>
    <text x="450" y="112" class="title subtitle main">without losing HUMAN agency</text>
  </g>
</svg>
